<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luminaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B4BA0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5ce6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado -->
  <rect x="10" y="10" width="108" height="108" rx="26" ry="26" fill="url(#luminaGradient)" />
  
  <!-- Ponto branco - bem pequeno no topo, bem centralizado -->
  <circle cx="64" cy="28" r="4.5" fill="white" />
  
  <!-- L branco com proporções exatas -->
  <g stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Linha vertical -->
    <line x1="64" y1="44" x2="64" y2="96" />
    <!-- Linha horizontal -->
    <line x1="64" y1="96" x2="90" y2="96" />
  </g>
</svg>