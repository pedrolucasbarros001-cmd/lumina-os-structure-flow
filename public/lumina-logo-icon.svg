<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luminaGradient" x1="10%" y1="10%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E4CB6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5B5CB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7968D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado com gradiente -->
  <rect x="8" y="8" width="112" height="112" rx="28" ry="28" fill="url(#luminaGradient)" />
  
  <!-- Ponto branco bem pequeno - topo -->
  <circle cx="64" cy="22" r="5" fill="white" />
  
  <!-- L branco com traços bem espessos e arredondados -->
  <g stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Linha vertical -->
    <line x1="64" y1="38" x2="64" y2="98" />
    <!-- Linha horizontal -->
    <line x1="64" y1="98" x2="98" y2="98" />
  </g>
</svg>